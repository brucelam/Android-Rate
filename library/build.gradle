plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace "brucelam.android.apprate"
    compileSdk 36

    defaultConfig {
        minSdk 27
        targetSdk 36
    }
    publishing {
        singleVariant("release") {
            withSourcesJar()
            withJavadocJar()
        }
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release

                groupId = 'com.github.brucelam'
                artifactId = 'Android-Rate'
                version = 'v1.1'
            }
        }
    }
}